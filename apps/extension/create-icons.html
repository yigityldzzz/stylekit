<!DOCTYPE html>
<!--
  StyleKit Icon Generator
  Open this file in a browser, then click "Download All Icons".
  The three PNG files will be downloaded — move them into the icons/ folder.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>StyleKit Icon Generator</title>
  <style>
    body { font-family: system-ui; background: #0f0f0f; color: #f0f0f0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:24px; }
    canvas { border: 1px solid #333; border-radius: 8px; }
    .row { display:flex; gap:16px; align-items:flex-end; }
    button { background:#6C63FF; color:#fff; border:none; padding:12px 28px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
    button:hover { background:#7c74ff; }
    label { font-size:12px; color:#9a9a9a; text-align:center; display:block; margin-top:6px; }
  </style>
</head>
<body>
  <h2 style="margin:0;letter-spacing:-0.5px">StyleKit Icon Generator</h2>

  <div class="row">
    <div><canvas id="c16"  width="16"  height="16"></canvas><label>16px</label></div>
    <div><canvas id="c48"  width="48"  height="48"></canvas><label>48px</label></div>
    <div><canvas id="c128" width="128" height="128"></canvas><label>128px</label></div>
  </div>

  <button onclick="downloadAll()">Download All Icons → icons/</button>

  <script>
    function drawIcon(canvas) {
      const size = canvas.width;
      const ctx  = canvas.getContext("2d");

      const pad  = Math.round(size * 0.08);
      const half = Math.round((size - pad * 2) / 2);
      const r    = Math.round(size * 0.14);
      const gap  = Math.round(size * 0.04);
      const w    = half - gap;

      // Background
      ctx.fillStyle = "#0f0f0f";
      ctx.fillRect(0, 0, size, size);

      const squares = [
        { x: pad,        y: pad,        color: "#6C63FF" },
        { x: pad + half, y: pad,        color: "#FF6584" },
        { x: pad,        y: pad + half, color: "#43C6AC" },
        { x: pad + half, y: pad + half, color: "#FFD166" },
      ];

      for (const sq of squares) {
        ctx.fillStyle = sq.color;
        ctx.beginPath();
        ctx.roundRect(sq.x, sq.y, w, w, r);
        ctx.fill();
      }
    }

    ["c16", "c48", "c128"].forEach(id => drawIcon(document.getElementById(id)));

    function downloadAll() {
      const icons = [
        { id: "c16",  name: "icon16.png" },
        { id: "c48",  name: "icon48.png" },
        { id: "c128", name: "icon128.png" },
      ];
      for (const { id, name } of icons) {
        const canvas = document.getElementById(id);
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a   = document.createElement("a");
          a.href     = url;
          a.download = name;
          a.click();
          URL.revokeObjectURL(url);
        }, "image/png");
      }
    }
  </script>
</body>
</html>
